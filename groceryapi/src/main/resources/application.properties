spring.application.name=groceryapi
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/groceryapp}
spring.data.mongodb.database=groceryapp

app.seller.email=admin@groceryapp.com
app.seller.password=admin@123

# JWT settings (secret should be changed for production; it's base64-encoded length expected by jjwt)
app.jwt.secret=ZmFrZXJzZWNyZXRmb3JkZXYxMjM0NTY3ODkwMTIzNDU2Nw==
app.jwt.expiration-ms=86400000

# Cloudinary Configuration
cloudinary.cloud-name=YOUR_CLOUDINARY_CLOUD_NAME
cloudinary.api-key=YOUR_CLOUDINARY_API_KEY
cloudinary.api-secret=YOUR_CLOUDINARY_API_SECRET

# Razorpay Configuration
razorpay.key-id=YOUR_RAZORPAY_KEY_ID
razorpay.key-secret=YOUR_RAZORPAY_KEY_SECRET

# Stripe Configuration
stripe.api-key=YOUR_STRIPE_API_KEY
stripe.webhook-secret=YOUR_STRIPE_WEBHOOK_SECRET

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

